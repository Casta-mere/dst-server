# NAS deployment reference — /volume3/Dev/dst/docker-compose.yml
# Requires: cluster/ and mods/ directories alongside this file

services:
  timid:
    image: fuglesteg/timid
    ports:
      - "11000:11000/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TIMID_PORT: 11000
      TIMID_TARGET_ADDRESS: dst-master:11000
      TIMID_CONTAINER_GROUP: dst
      TIMID_CONTAINER_SHUTDOWN_DELAY: 10m
      TIMID_CONNECTION_TIMEOUT_DELAY: 10m
    restart: always
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "3" }

  dst-master:
    image: ghcr.io/casta-mere/dst-server:latest
    container_name: dst-master
    ports:
      - "27018:27018/udp"
      - "8768:8768/udp"
    labels:
      - "timid.group.dst"
    volumes:
      - ./cluster:/data/MyCluster
      - ./mods:/mods
    environment:
      SHARD: Master
      CLUSTER_NAME: MyCluster
    restart: unless-stopped
    stop_grace_period: 60s
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "3" }

  dst-caves:
    image: ghcr.io/casta-mere/dst-server:latest
    container_name: dst-caves
    ports:
      - "11001:11001/udp"
      - "27019:27019/udp"
      - "8769:8769/udp"
    labels:
      - "timid.group.dst"
    volumes:
      - ./cluster:/data/MyCluster
      - ./mods:/mods
    environment:
      SHARD: Caves
      CLUSTER_NAME: MyCluster
    restart: unless-stopped
    stop_grace_period: 60s
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "3" }
