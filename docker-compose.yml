# Run from /volume3/Dev/dst-server on the NAS
# Game files pre-downloaded to /volume3/Dev/dst/game/ via steamcmd
# Auto-sleep via pause_when_empty=true in cluster.ini (built into DST)

services:
  dst-master:
    build: .
    image: dst-runtime:local
    container_name: dst-master
    ports:
      - "11000:11000/udp"
      - "27018:27018/udp"
      - "8768:8768/udp"
    volumes:
      - /volume3/Dev/dst/game:/opt/dst
      - /volume3/Dev/dst/cluster:/data/DoNotStarveTogether/MyCluster
      - /volume3/Dev/dst/mods:/mods
    environment:
      SHARD: Master
      CLUSTER_NAME: MyCluster
    restart: unless-stopped
    stop_grace_period: 60s
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "3" }

  dst-caves:
    build: .
    image: dst-runtime:local
    container_name: dst-caves
    ports:
      - "11001:11001/udp"
      - "27019:27019/udp"
      - "8769:8769/udp"
    volumes:
      - /volume3/Dev/dst/game:/opt/dst
      - /volume3/Dev/dst/cluster:/data/DoNotStarveTogether/MyCluster
      - /volume3/Dev/dst/mods:/mods
    environment:
      SHARD: Caves
      CLUSTER_NAME: MyCluster
    restart: unless-stopped
    stop_grace_period: 60s
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "3" }
